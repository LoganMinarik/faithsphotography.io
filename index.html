<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faith</title>
    <link rel="icon" href="assets/logo/TitleLogo581x581.png" type="image/png">
    <link rel="stylesheet" href="backend/CSS/Index.css">
</head>
<body>
    <header class="header">
        <h1>Faith</h1>
        <p>Portfolio</p>
        <button id="dark-mode-toggle" class="darkmodeButton">
            <img src="assets/icons/moon.png" alt="Toggle Dark Mode">
        </button>
    </header>

    <div class="logo-container " >
        <img src="assets/logo/BabyBiHueShiftLogoForFaith.png" alt="Faith Logo" class="main-logo floaty-clear">
    </div>

    <div class="container">
        <section class="section">
            <div class="yapping-box floaty">
                <p>Welcome to my portfolio. Feel free to explore my work and projects.</p>
                <button id="yippy-toggle" class="show-more"></button>
            </div>
        </section>

        <section class="section">
            <h2>Projects</h2>
            <div class="section-content">
                <div class="card-clear">
                    <img src="assets/images/project1.png" alt="Project 1">
                    <h3 class=>Project One</h3>
                    <p>Description of project one.</p>
                </div>
                <div class="card card-hidden" style="display: none;">
                    <img src="assets/images/project2.png" alt="Project 2">
                    <h3>Project Two</h3>
                    <p>Description of project two.</p>
                </div>
            </div>
            <button class="show-more">Show More</button>
            <button class="show-less" style="display: none;">Show Less</button>
        </section>

        <div class="social-icons">
            <a href="#" class="squircle socialLinkGithub">
                <img src="assets/icons/github.png" alt="FaceBook">
            </a>
            <a href="#" class="squircle socialLinkLinkedin">
                <img src="assets/icons/linkedin.png" alt="LinkedIn">
            </a>
            <a href="#" class="squircle socialLinkBlueSky">
                <img src="assets/icons/bluesky.png" alt="Instagram">
            </a>
        </div>
    </div>

    <footer>
        <p>&copy; 2023 Faith K Lastname. All rights reserved.</p>
    </footer>

    <script src="backend/JS/Index.js" type="module"></script>
</body>
</html>
